name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov pytest-timeout
      - name: Run BlobMixin tests (real-world-validated path)
        # Scoped to the test file exercised by the NeuroVista GMM cache
        # consolidation (2.56M pickles, zero errors). Other test files
        # contain pre-existing failures unrelated to this release and are
        # tracked separately.
        run: pytest tests/_sqlite3/_SQLite3Mixins/test__BlobMixin.py -v
